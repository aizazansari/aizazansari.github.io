<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>404 — Page Not Found · Aizaz Ansari</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #e8e8e8;
      background: radial-gradient(900px 500px at 70% 20%, rgba(118,139,146,0.12), transparent 60%),
                  linear-gradient(135deg, #0a0a0a 0%, #1a1c1f 100%);
      -webkit-font-smoothing: antialiased;
    }
    .code {
      font-size: clamp(4rem, 18vw, 9rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 0%, #768B92 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    p { color: #a6acb0; font-weight: 300; margin-bottom: 2rem; }
    a.home {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 30px;
      border: 1px solid rgba(118,139,146,0.4);
      color: #a0bfc7;
      text-decoration: none;
      font-weight: 500;
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }
    a.home:hover {
      transform: translateY(-2px);
      background: rgba(118,139,146,0.12);
      border-color: #768B92;
    }
    a.home:focus-visible { outline: 2px solid #a0bfc7; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>This page wandered off.</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a class="home" href="/">← Back home</a>
  </main>
</body>
</html>
